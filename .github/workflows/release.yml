name: Release Build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'jetbrains'
          java-version: '21'

      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Web UI
        working-directory: web-ui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Prepare build files
        run: |
          # 解码base64编码的keystore文件
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          
          # 写入签名配置到local.properties
          echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          
          # 写入Google Services配置
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: release-apk-arm64-v8a
          path: app/build/outputs/apk/release/*arm64-v8a*release*.apk
          compression-level: 0

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: release-apk-x86_64
          path: app/build/outputs/apk/release/*x86_64*release*.apk
          compression-level: 0

      - name: Upload universal APK
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: release-apk-universal
          path: app/build/outputs/apk/release/*universal*release*.apk
          compression-level: 0
