name: Android Instrumented Tests

on:
  push:
    branches:
      - "**"
    paths:
      - "app/**"
      - "ai/**"
      - "common/**"
      - "document/**"
      - "highlight/**"
      - "search/**"
      - "tts/**"
      - "web/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android-instrumented-tests.yml"
  pull_request:
    paths:
      - "app/**"
      - "ai/**"
      - "common/**"
      - "document/**"
      - "highlight/**"
      - "search/**"
      - "tts/**"
      - "web/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android-instrumented-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "jetbrains"
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Prepare Google Services config
        env:
          PLACEHOLDER_GOOGLE_SERVICES_JSON: |
            {
              "project_info": {
                "project_number": "000000000000",
                "project_id": "ci-placeholder-project",
                "storage_bucket": "ci-placeholder-project.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                    "android_client_info": {
                      "package_name": "me.rerere.rikkahub.ywxk"
                    }
                  },
                  "api_key": [
                    {
                      "current_key": "placeholder"
                    }
                  ]
                },
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:1111111111111111111111",
                    "android_client_info": {
                      "package_name": "me.rerere.rikkahub.ywxk.debug"
                    }
                  },
                  "api_key": [
                    {
                      "current_key": "placeholder"
                    }
                  ]
                }
              ],
              "configuration_version": "1"
            }
        run: |
          printf '%s' "${PLACEHOLDER_GOOGLE_SERVICES_JSON}" > app/google-services.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-metrics
          script: |
            adb wait-for-device
            while [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" != "1" ]; do sleep 5; done
            while ! adb shell pm path android >/dev/null 2>&1; do sleep 5; done
            chmod +x gradlew
            ./gradlew connectedDebugAndroidTest

      - name: Upload instrumented test reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: android-instrumented-test-reports
          path: |
            **/build/reports/androidTests/connected/**
            **/build/outputs/androidTest-results/connected/**
