name: Android Release Smoke

on:
  push:
    branches:
      - "**"
    paths:
      - "app/**"
      - "ai/**"
      - "common/**"
      - "document/**"
      - "highlight/**"
      - "search/**"
      - "tts/**"
      - "web/**"
      - "web-ui/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android-release-smoke.yml"
  pull_request:
    paths:
      - "app/**"
      - "ai/**"
      - "common/**"
      - "document/**"
      - "highlight/**"
      - "search/**"
      - "tts/**"
      - "web/**"
      - "web-ui/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android-release-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "jetbrains"
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Web UI dependencies
        working-directory: web-ui
        run: bun install --frozen-lockfile

      - name: Build Web UI
        working-directory: web-ui
        run: bun run build

      - name: Prepare Google Services config
        env:
          PLACEHOLDER_GOOGLE_SERVICES_JSON: |
            {
              "project_info": {
                "project_number": "000000000000",
                "project_id": "ci-placeholder-project",
                "storage_bucket": "ci-placeholder-project.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                    "android_client_info": {
                      "package_name": "me.rerere.rikkahub.ywxk"
                    }
                  },
                  "api_key": [
                    {
                      "current_key": "placeholder"
                    }
                  ]
                },
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:1111111111111111111111",
                    "android_client_info": {
                      "package_name": "me.rerere.rikkahub.ywxk.debug"
                    }
                  },
                  "api_key": [
                    {
                      "current_key": "placeholder"
                    }
                  ]
                }
              ],
              "configuration_version": "1"
            }
        run: |
          printf '%s' "${PLACEHOLDER_GOOGLE_SERVICES_JSON}" > app/google-services.json

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Upload release smoke APKs
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: android-release-smoke-apks
          path: app/build/outputs/apk/release/*.apk
          compression-level: 0
